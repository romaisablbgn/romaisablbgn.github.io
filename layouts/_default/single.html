{{- define "main" }}
    <h1>{{ .Title | .RenderString }}</h1>
    <h4>{{ .Params.description }}</h4>

    {{- if isset .Params "date" }}
    <p class="author-date">{{ printf `<time datetime="%s">%s</time>` (.Date.Format "2006-01-02T15:04:05Z07:00") (.Date.Format "January 2, 2006") | safeHTML }}</p>
    {{- end }}

{{ .Content }}
{{- end }}
